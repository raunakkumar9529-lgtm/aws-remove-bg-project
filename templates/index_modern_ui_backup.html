<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove BG AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    color: #38bdf8;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.upload-box {
    border: 2px dashed #38bdf8;
    padding: 40px;
    text-align: center;
    border-radius: 12px;
    background: #111827;
    cursor: pointer;
}

.upload-box:hover {
    background: #1f2937;
}

input {
    display: none;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

.preview {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    margin-top: 25px;
}

.preview img {
    width: 100%;
    max-width: 350px;
    border-radius: 10px;
    margin: 10px;
}

.loader {
    display: none;
    text-align: center;
    margin-top: 20px;
    color: yellow;
}

.download {
    display: block;
    margin-top: 10px;
    color: #22c55e;
}

@media(max-width:768px){
    .preview {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<header>AI Background Remover</header>

<div class="container">

<form id="form" enctype="multipart/form-data">

<div class="upload-box" id="drop-area">
<p>Drag & Drop image OR click to upload</p>
<input type="file" name="image" id="fileInput">
</div>

<button type="submit">Remove Background</button>

</form>

<div class="loader" id="loader">Processing image... ⏳</div>

<div class="preview">

{% if original %}
<div>
<h3>Original</h3>
<img src="{{ original }}">
</div>
{% endif %}

{% if result %}
<div>
<h3>Result</h3>
<img src="{{ result }}">
<br>
<a class="download" href="{{ result }}" download>⬇ Download</a>
</div>
{% endif %}

</div>

</div>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("fileInput");
const form = document.getElementById("form");
const loader = document.getElementById("loader");

// click upload
dropArea.onclick = () => fileInput.click();

// drag & drop
dropArea.addEventListener("dragover", e => e.preventDefault());

dropArea.addEventListener("drop", e => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
});

// loader show
form.onsubmit = () => {
    loader.style.display = "block";
};
</script>

</body>
</html>
